name: Genera tessere

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - run: pip install -r requirements.txt

      - run: python generate_cards.py --pdf

      - uses: actions/upload-artifact@v4
        with:
          name: tessere-generate
          path: output/
